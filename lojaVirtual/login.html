<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Login do Funcionário</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <div class="card p-4 mx-auto" style="max-width: 400px">
        <h1 class="mb-3 text-center">Login</h1>

        <p class="text-muted text-center">
          Acesse o painel administrativo da loja.
        </p>

        <input type="email" id="emailLogin" placeholder="E-mail" class="form-control mb-2" />

        <input type="password" id="senhaLogin" placeholder="Senha" class="form-control mb-3"/>

        <button id="btnLogin" class="btn btn-primary w-100">Entrar</button>

        <p id="mensagemLogin" class="mt-3 text-center"></p>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="login.js"></script>
  </body>
</html>
