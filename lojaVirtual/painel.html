<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Painel Administrativo</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container py-5">
        <h1 class="mb-4" id="topo">Painel Administrativo</h1>

        <a href="index.html" class="btn btn-outline-secondary mb-4">
          Voltar para a loja
        </a>

        <button id="btnSair" class="btn btn-outline-danger mb-4">
          Sair
        </button>

        <p class="text-muted">Gerencie os produtos cadastrados na loja.</p>

        <div class="card p-4 mb-4 col-12 mx-auto">
            <h2 class="mb-3">Cadastro de Produto</h2>

            <input type="text" id="nomeProduto" placeholder="Nome do produto" class="form-control mb-2" />

            <input type="text" id="descricaoProduto" placeholder="Descrição do produto" class="form-control mb-2"/>

            <input type="number" id="precoProduto" placeholder="Preço" class="form-control mb-2" />

            <select class="form-select" id="categoriaProduto" class="form-control" required>
										<option value="">Selecione uma categoria</option>
										<option value="smartphone">Smartphone</option>
										<option value="notebook">Notebook</option>
										<option value="tablet">Tablet</option>
										<option value="acessorios">Acessórios</option>
										<option value="perifericos">Periféricos</option>
										<option value="monitore">Monitor</option>
										<option value="audio">Áudio</option>
										<option value="rede">Rede</option>
										<option value="armazenamento">Armazenamento</option>
										<option value="impressora">Impressora</option>
										<option value="smartwatch">Smartwatch</option>
						</select>

            <input type="text" id="imagemProduto" placeholder="URL da imagem" class="form-control mb-2 mt-2"  />

            <button id="btnSalvar" class="btn btn-success">Cadastrar Produto</button>
        </div>

        <div class="card p-4">
            <h2 class="mb-3">Produtos Cadastrados</h2>

            <div id="listaProdutosPainel" class="row justify-content-center"></div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="painel.js"></script>
  </body>
</html>
